<body>
<div id="app"></div>
<script>
// ===================== CONSTANTS & STATE =====================
const CFG="voinov_cfg3", TK="voinov2026clinic";
const KEYS={patients:"A1",schedule:"B1",users:"C1",services:"D1"};

let S={apiUrl:"",session:null,patients:[],schedule:{},users:[],services:[],sync:"ok",loading:false,_lastSaveMs:0};

function loadCfg(){
  try{
    const c=JSON.parse(localStorage.getItem(CFG)||"{}");
    S.apiUrl=c.apiUrl||"";
    // Only restore userId+email+name, never role (always re-derive from S.users)
    if(c.session?.userId)S.session={userId:c.session.userId,email:c.session.email||"",name:c.session.name||"",role:"__pending__"};
    else S.session=null;
  }catch{}
}
function saveCfg(){
  // Never save role to localStorage — always re-derive from S.users on load
  const sess=S.session?{userId:S.session.userId,email:S.session.email,name:S.session.name}:null;
  localStorage.setItem(CFG,JSON.stringify({apiUrl:S.apiUrl,session:sess}));
}
function resolveRole(){
  // Called after S.users is loaded. Corrects session.role from S.users.
  if(!S.session)return;
  if(S._previewFrom){
    // In preview mode — keep preview role, but verify base user still exists
    const base=S.users.find(x=>x.id===S.session.userId&&x.active!==false);
    if(!base){S.session=null;S._previewFrom=null;saveCfg();}
    return;
  }
  const u=S.users.find(x=>x.id===S.session.userId&&x.active!==false);
  if(!u){S.session=null;saveCfg();return;}
  S.session={...S.session,role:u.role,name:u.name};
}
function cacheGet(k){try{const v=localStorage.getItem("vc_"+k);return v?JSON.parse(v):null;}catch{return null;}}
function cacheSet(k,v){try{localStorage.setItem("vc_"+k,JSON.stringify(v));}catch{}}

// ===================== CRYPTO =====================
async function hashPw(pw){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pw+TK));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ===================== API =====================
async function apiGet(key){
  const r=await fetch(S.apiUrl+"?key="+key,{redirect:"follow"});
  if(!r.ok)throw new Error(r.status);
  const t=await r.text();return t?JSON.parse(t):null;
}
function apiPost(key,value){
  if(!S.apiUrl)return;
  // GAS always 302-redirects POST. Use no-cors to fire-and-forget safely.
  // no-cors: browser sends the request but doesn't read response (ok for writes).
  fetch(S.apiUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({token:TK,key,value:JSON.stringify(value)})}).catch(()=>{});
  // Also save via GET with encoded data as fallback for problematic networks
  // (not needed normally, GAS handles POST fine in no-cors mode)
}

async function apiSend(key,value){
  if(!S.apiUrl)return{ok:false};
  try{const r=await fetch(S.apiUrl,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},body:JSON.stringify({token:TK,key,value:JSON.stringify(value)})});const t=await r.text();return t?JSON.parse(t):{ok:true};}
  catch{return{ok:false};}
}
let saveTimer=null;
let _pendingKeys=new Set();
function triggerSave(keys){
  S._lastSaveMs=Date.now();
  S.sync="saving";updateSyncBars();
  keys.forEach(k=>_pendingKeys.add(k));
  if(keys.includes("patients"))cacheSet("patients",S.patients);
  if(keys.includes("schedule"))cacheSet("schedule",S.schedule);
  if(keys.includes("users"))cacheSet("users",S.users);
  if(keys.includes("services"))cacheSet("services",S.services);
  // ALL keys save immediately — no debounce
  if(keys.includes("patients"))apiPost("patients",S.patients);
  if(keys.includes("schedule"))apiPost("schedule",S.schedule);
  if(keys.includes("users")){apiPost("users",S.users);setTimeout(()=>_pendingKeys.delete("users"),5000);}
  if(keys.includes("services")){apiPost("services",S.services);setTimeout(()=>_pendingKeys.delete("services"),5000);}
  // Clear pending after 3s (time for GAS to process)
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    _pendingKeys.delete("patients");
    _pendingKeys.delete("schedule");
    S.sync="ok";updateSyncBars();
  },10000);
}
let lastSyncTime=null;
function updateSyncBars(){
  if(S.sync==="ok")lastSyncTime=new Date();
  const now=lastSyncTime?lastSyncTime.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}):"";
  const lbl={ok:"✓ "+now,saving:"⏳ Сохранение...",err:"⚠️ Нет связи"};
  document.querySelectorAll(".syncbar").forEach(b=>{
    b.className="syncbar "+S.sync;
    const s=b.querySelector(".synclbl");if(s)s.textContent=lbl[S.sync]||"";
  });
}
async function loadData(){
  if(!S.apiUrl)return;
  // Capture current displayed state BEFORE any updates
  const prevP=JSON.stringify(S.patients);
  const prevS=JSON.stringify(S.schedule);
  const prevU=JSON.stringify(S.users);
  ["patients","schedule","users","services"].forEach(k=>{const c=cacheGet(k);if(c){if(k==="patients")S.patients=c;else if(k==="schedule")S.schedule=migrateSchedule(c);else if(k==="users")S.users=c;else if(k==="services")S.services=c;}});
  try{
    const[p,s,u,sv]=await Promise.all([apiGet("patients"),apiGet("schedule"),apiGet("users"),apiGet("services")]);
    // Don't overwrite keys that have pending local changes
    if(Array.isArray(p)&&!_pendingKeys.has("patients"))S.patients=p;
    else if(Array.isArray(p)&&_pendingKeys.has("patients")){/* keep local version */}
    if(s&&typeof s==="object"&&!_pendingKeys.has("schedule"))S.schedule=migrateSchedule(s);
    if(Array.isArray(u)&&!_pendingKeys.has("users"))S.users=u;
    if(Array.isArray(sv)&&!_pendingKeys.has("services"))S.services=sv;
    cacheSet("patients",S.patients);cacheSet("schedule",S.schedule);cacheSet("users",S.users);cacheSet("services",S.services);
    S.sync="ok";
    // Re-validate role after users loaded (critical for correct routing)
    resolveRole();
    // Re-render if ANY data changed
    const changed=JSON.stringify(S.patients)!==prevP||JSON.stringify(S.schedule)!==prevS||JSON.stringify(S.users)!==prevU;
    // Only re-render if no pending writes AND enough time passed since last save
    const safeTorerender=_pendingKeys.size===0&&(Date.now()-S._lastSaveMs>10000);
    // Don't re-render if user is actively editing a patient (would reset form fields)
    const userIsEditing=!!(SCR.editId||SCR.sub==="pat"||SCR.openSlotId);
    if(changed&&S.session&&S.session.role!=="__pending__"&&safeTorerender&&!userIsEditing)render();
  }catch{S.sync="err";}
}
function migrateSchedule(sch){
  const m={};
  Object.entries(sch).forEach(([d,v])=>{
    if(Array.isArray(v))m[d]={blocks:[],slots:v.map(s=>({id:s.id||uid(),time:s.time,endTime:s.endTime||"",available:s.available,patientId:s.patientId||null,patientName:s.patientName||null,serviceId:null,serviceName:s.serviceName||null,serviceDuration:30,clinic:s.clinic||""}))};
    else m[d]=v;
  });
  return m;
}

// ===================== UTILS =====================
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>{const d=new Date();return d.getFullYear()+"-"+(String(d.getMonth()+1).padStart(2,"0"))+"-"+(String(d.getDate()).padStart(2,"0"));};
const parseDate=s=>{if(!s)return null;const d=new Date(/^\d{4}-\d{2}-\d{2}$/.test(s)?s+"T12:00:00":s);return isNaN(d.getTime())?null:d;};
const fmtD=s=>{const d=parseDate(s);return d?d.toLocaleDateString("ru-RU",{day:"numeric",month:"short"}):"—";};
const fmtF=s=>{const d=parseDate(s);return d?d.toLocaleDateString("ru-RU",{day:"numeric",month:"long",year:"numeric"}):"—";};
function calcAge(bd){if(!bd)return null;const b=new Date(bd),n=new Date();let a=n.getFullYear()-b.getFullYear();if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate()))a--;return a>=0?a:null;}
function ageLabel(bd){const a=calcAge(bd);if(a===null)return"—";const s=a%10===1&&a%100!==11?"год":a%10>=2&&a%10<=4&&(a%100<10||a%100>=20)?"года":"лет";return a+" "+s;}

const ST={new:{l:"Новый",c:"#64748B"},scheduled:{l:"Записан",c:"#2563EB"},consulted:{l:"Принят",c:"#7C3AED"},preop:{l:"Ждёт операции",c:"#D97706"},operated:{l:"Прооперирован",c:"#059669"},followup:{l:"Наблюдение",c:"#0891B2"},cancelled:{l:"Отменён",c:"#EF4444"},completed:{l:"Завершён",c:"#94A3B8"}};
const CT={callback:"Перезвонить",confirm:"Подтвердить запись",postop:"После операции",postvisit:"После приёма",schedule:"Записать на приём",review:"Попросить отзыв"};
const SRC={instagram:"Instagram",telegram:"Telegram",site:"Сайт",yandex:"Яндекс",referral:"Направление",repeat:"Повторный",other:"Другое"};
const CLINICS=["Реал Клиник","Н-клиник","Акфа Ташкент"];
function fmtPrice(price,clinic){if(!price)return"—";const n=Number(price).toLocaleString("ru-RU");return(clinic||"").includes("Акфа")||((clinic||"").includes("Ташкент"))?n+" сум":n+" ₽";}
const ROLES={admin:"Администратор",doctor:"Врач",assistant:"Ассистент",web:"Команда сайта"};

function autoStatus(p){
  if(["completed","cancelled","followup","operated"].includes(p.status))return p.status;
  if(p.opDate||p.opDateText){if(["new","scheduled","consulted"].includes(p.status))return"preop";}
  if(p.outcome&&["new","scheduled"].includes(p.status))return"consulted";
  return p.status;
}
function generateSlots(block){
  const slots=[];
  let [h,m]=block.fromTime.split(":").map(Number);
  const [eh,em]=block.toTime.split(":").map(Number);
  const end=eh*60+em,dur=block.slotDuration||30;
  while(h*60+m+dur<=end){
    const t=String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
    const em2=h*60+m+dur,eh2=Math.floor(em2/60),em2r=em2%60;
    const et=String(eh2).padStart(2,"0")+":"+String(em2r).padStart(2,"0");
    slots.push({id:uid(),time:t,endTime:et,available:true,patientId:null,patientName:null,serviceId:null,serviceName:null,serviceDuration:dur,clinic:block.clinic||""});
    m+=dur;h+=Math.floor(m/60);m=m%60;
  }
  return slots;
}
function mergeSlots(existing,newSlots){
  // Keep ALL existing slots (available and booked), add new ones that don't conflict
  const times=new Set(existing.map(s=>s.time));
  const toAdd=newSlots.filter(s=>!times.has(s.time));
  return [...existing,...toAdd].sort((a,b)=>a.time.localeCompare(b.time));
}
function getMonday(ds){
  const d=new Date(ds+"T12:00:00");const day=d.getDay();
  d.setDate(d.getDate()+(day===0?-6:1-day));
  return localDateStr(d);
}
function copyScheduleByWeek(srcDate,tFrom,tTo){
  const srcMon=getMonday(srcDate);
  const srcByDow={};
  for(let i=0;i<7;i++){const d=new Date(srcMon+"T12:00:00");d.setDate(d.getDate()+i);const ds=localDateStr(d);const dow=d.getDay();srcByDow[dow]=S.schedule[ds]||{blocks:[],slots:[]};}
  const ns={...S.schedule};let count=0;
  const cur=new Date(tFrom+"T12:00:00");const end=new Date(tTo+"T12:00:00");
  while(cur<=end){
    const dow=cur.getDay();const ds=localDateStr(cur);
    if(srcByDow[dow]?.blocks?.length){
      const src=srcByDow[dow];
      const newBlocks=src.blocks.map(b=>({...b,id:uid()}));
      let newSlots=[];newBlocks.forEach(b=>newSlots=[...newSlots,...generateSlots(b)]);
      const merged=mergeSlots(ns[ds]?.slots||[],newSlots);
      ns[ds]={blocks:newBlocks,slots:merged};count++;
    }
    cur.setDate(cur.getDate()+1);
  }
  S.schedule=ns;triggerSave(["schedule"]);return count;
}

let SCR={tab:"today",sub:null,schDate:null,editId:null,dview:"dashboard"};
function h(tag,a,...kids){
  const el=document.createElement(tag);
  if(a)Object.entries(a).forEach(([k,v])=>{
    if(k==="cls")el.className=v;
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="sty"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="disabled")el.disabled=v;
    else el.setAttribute(k,v);
  });
  kids.flat(9).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});
  return el;
}

function renderApp(){
  const app=document.getElementById("app");app.innerHTML="";
  if(!S.apiUrl){app.appendChild(renderSetup());return;}
  if(!S.session){app.appendChild(renderLogin());return;}
  // If role still pending (page just loaded), wait for users to load
  if(S.session.role==="__pending__"){
    if(S.users.length){resolveRole();}
    if(!S.session||S.session.role==="__pending__"){
      app.appendChild(h("div",{cls:"loader"},"⏳ Загрузка..."));
      // Trigger a data load if we're stuck in pending
      if(!S.loading)loadData().then(()=>render());
      return;
    }
  }
  resolveRole();
  if(!S.session){app.appendChild(renderLogin());return;}
  const role=S.session.role;
  if(role==="admin"||role==="doctor")app.appendChild(renderDoctor());
  else if(role==="assistant")app.appendChild(renderAssistant());
  else if(role==="web")app.appendChild(renderWeb());
  else app.appendChild(renderLogin()); // unknown role
}

function renderLogin(){
  const emailI=h("input",{cls:"fi",type:"email",placeholder:"your@email.com",sty:{marginBottom:12}});
  const pwI=h("input",{cls:"fi",type:"password",placeholder:"Пароль",sty:{marginBottom:12}});
  const err=h("div",{sty:{color:"#DC2626",fontSize:13,marginBottom:12,display:"none",lineHeight:1.5}});
  const btn=h("button",{cls:"btn bp bw",onclick:async()=>{
    const email=emailI.value.trim().toLowerCase(),pw=pwI.value;
    if(!email||!pw){err.style.display="block";err.textContent="Введите логин и пароль";return;}
    btn.disabled=true;btn.textContent="Вход...";err.style.display="none";
    const user=S.users.find(u=>u.email.toLowerCase()===email&&u.active!==false);
    if(!user){err.style.display="block";err.textContent="Пользователь не найден или доступ закрыт";btn.disabled=false;btn.textContent="Войти";return;}
    if(!user.passwordHash){err.style.display="block";err.textContent="Пароль ещё не установлен. Обратитесь к администратору.";btn.disabled=false;btn.textContent="Войти";return;}
    const hash=await hashPw(pw);
    if(hash!==user.passwordHash){err.style.display="block";err.textContent="Неверный пароль";btn.disabled=false;btn.textContent="Войти";return;}
    S.session={userId:user.id,email:user.email,name:user.name,role:user.role};S._previewFrom=null;saveCfg();render();
  }},"Войти");
  // First run — no users at all
  const isFirstRun=S.users.length===0;
  if(isFirstRun){
    btn.onclick=async()=>{
      const email=emailI.value.trim().toLowerCase(),pw=pwI.value;
      if(!email||!pw||pw.length<4){err.style.display="block";err.textContent="Введите логин и пароль (мин. 4 символа)";return;}
      btn.disabled=true;btn.textContent="Создаём...";
      const hash=await hashPw(pw);
      const newUser={id:uid(),email,name:"Администратор",role:"admin",passwordHash:hash,active:true,createdAt:new Date().toISOString()};
      S.users=[newUser];cacheSet("users",S.users);apiPost("users",S.users);
      S.session={userId:newUser.id,email:newUser.email,name:newUser.name,role:newUser.role};saveCfg();render();
    };
    btn.textContent="Создать администратора";
  }
  return h("div",{cls:"login-wrap"},h("div",{cls:"login-box"},
    h("div",{sty:{fontSize:40,marginBottom:12}},"🩺"),
    h("div",{sty:{fontSize:22,fontWeight:800,color:"var(--p)",marginBottom:4}},"Доктор Войнов"),
    h("div",{sty:{fontSize:13,color:"var(--mu)",marginBottom:28}},"doctorvoinov.ru"),
    h("div",{cls:"fg"},h("label",{cls:"fl"},"Логин (email)"),emailI),
    h("div",{cls:"fg"},h("label",{cls:"fl"},"Пароль"),pwI),
    err,btn,
    isFirstRun?h("div",{cls:"alert alert-warn",sty:{marginTop:16}},"Первый запуск. Введите любой email и придумайте пароль — будет создан аккаунт администратора."):null,
    h("button",{onclick:()=>{S.apiUrl="";saveCfg();render();},sty:{marginTop:20,background:"none",border:"none",color:"var(--hi)",fontSize:12,cursor:"pointer",fontFamily:"inherit",display:"block"}},"Изменить подключение")
  ));
}

    h("div",{cls:"fg"},h("label",{cls:"fl"},"Повторите"),pw2),
    ok,err,btn

function patTasksWrap(p,role){

function rebuildTasks(wrap,p,role){
  wrap.innerHTML="";
  const pp=S.patients.find(x=>x.id===p.id)||p;
  const active=(pp.tasks||[]).filter(t=>!t.completed);
  const done=(pp.tasks||[]).filter(t=>t.completed);
  if(!active.length)wrap.appendChild(h("div",{cls:"emp",sty:{padding:"20px 0"}},h("div",{},"Нет активных задач")));
  active.forEach(t=>wrap.appendChild(makeTaskEl(t,pp,role,wrap)));
  // Add task
  let showF=false;
  const showB=h("button",{cls:"btn bs bw",sty:{marginTop:8},onclick:()=>{showF=true;rebForm();}},"+  Добавить задачу");
  const form=h("div",{cls:"card",sty:{marginTop:8,display:"none"}});
  const ts=h("select",{cls:"fi"});Object.entries(CT).forEach(([k,v])=>ts.appendChild(h("option",{value:k},v)));
  const di=h("input",{cls:"fi",type:"date",value:today()});
  const desc=h("textarea",{cls:"fi",sty:{minHeight:56},placeholder:"Комментарий..."});
  form.appendChild(h("div",{cls:"fg"},h("label",{cls:"fl"},"Тип"),ts));
  form.appendChild(h("div",{cls:"fg"},h("label",{cls:"fl"},"Дата"),di));
  form.appendChild(h("div",{cls:"fg"},h("label",{cls:"fl"},"Комментарий"),desc));
  form.appendChild(h("div",{sty:{display:"flex",gap:8}},
    h("button",{cls:"btn bp",sty:{flex:1},onclick:async()=>{
      const newTask={id:uid(),type:ts.value,dueDate:di.value,description:desc.value,completed:false,createdAt:new Date().toISOString()};
      await savePats(S.patients.map(pr=>pr.id!==pp.id?pr:{...pr,tasks:[...(pr.tasks||[]),newTask]}),true);
      rebuildTasks(wrap,S.patients.find(x=>x.id===pp.id),role);
    }},"Создать задачу"),
    h("button",{cls:"btn bs",onclick:()=>{showF=false;rebForm();}},"Отмена")
  ));
  function rebForm(){showB.style.display=showF?"none":"flex";form.style.display=showF?"block":"none";}

function makeTaskEl(t,p,role,wrap){
  const isUrg=t.dueDate<today();
  const el=h("div",{cls:"task-item"});
  if(isUrg)el.style.borderLeft="3px solid var(--r)";
  let expanded=false;
  const arrow=h("span",{sty:{color:"var(--mu)",fontSize:16,transition:"transform .15s",display:"inline-block"}},"›");
  const hdr=h("div",{cls:"task-hdr"},
    arrow,
    h("div",{sty:{flex:1}},
      h("div",{sty:{fontWeight:700,fontSize:14}},CT[t.type]||t.type),
      t.description?h("div",{sty:{fontSize:12,color:"var(--tx)",marginTop:1}},t.description):null,
      h("div",{sty:{fontSize:11,color:isUrg?"var(--r)":"var(--mu)",marginTop:2}},"📅 "+fmtD(t.dueDate))
    ),
    h("button",{cls:"task-done-btn",onclick:async e=>{
      e.stopPropagation();
      await savePats(S.patients.map(pr=>pr.id!==p.id?pr:{...pr,tasks:(pr.tasks||[]).map(tk=>tk.id!==t.id?tk:{...tk,completed:true,completedAt:new Date().toISOString()})}),true);
      rebuildTasks(wrap,S.patients.find(x=>x.id===p.id),role);
    }},"✓ Готово")
  );
  hdr.addEventListener("click",e=>{if(e.target.classList.contains("task-done-btn"))return;expanded=!expanded;body.style.display=expanded?"block":"none";arrow.style.transform=expanded?"rotate(90deg)":"";});
  const commentTA=h("textarea",{cls:"fi",sty:{minHeight:60,marginBottom:8,fontSize:14},placeholder:"Комментарий к звонку..."});
  commentTA.value=t.comment||"";
  const statusSel=h("select",{cls:"fi",sty:{marginBottom:8}});
  Object.entries(ST).forEach(([k,v])=>{const o=h("option",{value:k},v.l);if(k===p.status)o.selected=true;statusSel.appendChild(o);});
  const body=h("div",{cls:"task-body"},
    h("div",{cls:"fg"},h("label",{cls:"fl"},"Комментарий"),commentTA),
    h("div",{cls:"fg"},h("label",{cls:"fl"},"Статус пациента"),statusSel),
    h("div",{sty:{display:"flex",gap:8}},
      h("button",{cls:"btn bp",sty:{flex:1},onclick:async()=>{
        await savePats(S.patients.map(pr=>pr.id!==p.id?pr:{...pr,status:statusSel.value,tasks:(pr.tasks||[]).map(tk=>tk.id!==t.id?tk:{...tk,comment:commentTA.value})}),true);
        rebuildTasks(wrap,S.patients.find(x=>x.id===p.id),role);
      }},"Сохранить"),
      h("button",{cls:"btn bs",onclick:async()=>{
        await savePats(S.patients.map(pr=>pr.id!==p.id?pr:{...pr,tasks:(pr.tasks||[]).map(tk=>tk.id!==t.id?tk:{...tk,completed:true,comment:commentTA.value,completedAt:new Date().toISOString()})}),true);
        rebuildTasks(wrap,S.patients.find(x=>x.id===p.id),role);
      }},"✓ Выполнено")
    )
  );
  // Auto-expand if this is the task navigated from today tab
  if(SCR.openTaskId&&t.id===SCR.openTaskId){
    expanded=true;body.style.display="block";arrow.style.transform="rotate(90deg)";
    setTimeout(()=>{el.scrollIntoView({behavior:"smooth",block:"center"});SCR.openTaskId=null;},200);
  }
  el.appendChild(hdr);el.appendChild(body);
  return el;
}

    const w=wrap.parentNode;if(w){w.innerHTML="";w.appendChild(patNotes(S.patients.find(x=>x.id===p.id),role));}
  }},"Сохранить")));
  return wrap;
}

// ===================== BOOKING MODAL =====================
function showBookingModal(p){
  // Stable state — never reset by sub-form changes
  let selDate=wDates(14)[0]||today(),selSlot=null,selSvc=null,customDur=null;
  let showNewSvc=false;
  let overlay;
  function close(){if(overlay?.parentNode)overlay.parentNode.removeChild(overlay);}

  // Build once, then update parts in-place
  const body=h("div",{cls:"modal"});
  body.appendChild(h("div",{sty:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
    h("div",{sty:{fontWeight:800,fontSize:18}},"Записать на приём"),
    h("button",{cls:"hb",sty:{background:"var(--bg)",color:"var(--tx)"},onclick:close},"✕")
  ));
  body.appendChild(h("div",{sty:{fontWeight:600,marginBottom:12}},p.name));

  // ─── Date strip (rebuilt when month changes) ──────────────────────────────
  let schYr=(()=>{const d=new Date();return d.getFullYear();})();
  let schMo=(()=>{const d=new Date();return d.getMonth();})();
  const dateLabel=h("span",{sty:{fontWeight:600,fontSize:13,flex:1,textAlign:"center"}});
  const dateStrip=h("div",{cls:"dr",sty:{marginBottom:0}});
  const dateWrap=h("div",{cls:"fg"},h("label",{cls:"fl"},"Дата"),
    h("div",{sty:{display:"flex",alignItems:"center",gap:6,marginBottom:6}},
      h("button",{cls:"btn bs bsm",onclick:()=>{schMo--;if(schMo<0){schMo=11;schYr--;}rebDates();}},"←"),
      dateLabel,
      h("button",{cls:"btn bs bsm",onclick:()=>{schMo++;if(schMo>11){schMo=0;schYr++;}rebDates();}},"→")
    ),
    dateStrip
  );
  body.appendChild(dateWrap);

  function rebDates(){
    dateLabel.textContent=new Date(schYr,schMo).toLocaleDateString("ru-RU",{month:"long",year:"numeric"});
    dateStrip.innerHTML="";
    const allDays=[];const d=new Date(schYr,schMo,1);
    while(d.getMonth()===schMo){allDays.push(localDateStr(d));d.setDate(d.getDate()+1);}
    allDays.forEach(dd=>{
      const dobj=new Date(dd);
      const fr=(S.schedule[dd]?.slots||[]).filter(s=>s.available).length;
      const btn=h("button",{cls:"dc"+(dd===selDate?" on":""),"data-date":dd,onclick:()=>{selDate=dd;selSlot=null;rebSlots();rebBook();}},
        h("span",{cls:"dsb"},dobj.toLocaleDateString("ru-RU",{weekday:"short"})),dobj.getDate(),
        h("span",{cls:"dsb",sty:{color:dd===selDate?"rgba(255,255,255,.75)":"var(--p)"}},fr>0?fr+" св.":"—")
      );
      dateStrip.appendChild(btn);
    });
    // scroll selected into view
    setTimeout(()=>{const sel=dateStrip.querySelector(".dc.on");if(sel)sel.scrollIntoView({inline:"center",block:"nearest"});},50);
  }

  // ─── Slot grid (rebuilt when date changes) ────────────────────────────────
  const slotArea=h("div",{cls:"fg"},h("label",{cls:"fl"},"Время"));
  body.appendChild(slotArea);
  function rebSlots(){
    // Sync active state on date strip without full rebuild
    dateStrip.querySelectorAll(".dc").forEach(b=>{
      const dd=b.getAttribute("data-date");
      if(dd){b.className="dc"+(dd===selDate?" on":"");}
      const sub=b.querySelector("span:last-child");
      if(sub&&dd){const fr=(S.schedule[dd]?.slots||[]).filter(s=>s.available).length;sub.textContent=fr>0?fr+" св.":"—";sub.style.color=dd===selDate?"rgba(255,255,255,.75)":"var(--p)";}
    });
    const nowHHMM=(()=>{const n=new Date();return String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");})();
    const slots=(S.schedule[selDate]?.slots||[]).filter(s=>s.available&&(selDate!==today()||s.time>=nowHHMM));
    slotArea.innerHTML="";slotArea.appendChild(h("label",{cls:"fl"},"Время"));
    slotArea.scrollIntoView&&slotArea.scrollIntoView({behavior:"smooth",block:"nearest"});
    if(!slots.length){slotArea.appendChild(h("div",{sty:{fontSize:13,color:"var(--mu)",padding:"8px 0"}},"Нет свободных слотов на эту дату"));return;}
    const grid=h("div",{sty:{display:"flex",flexWrap:"wrap"}});
    slots.forEach(s=>{
      const isSel=selSlot?.id===s.id;
      const el=h("div",{cls:"slt fr",sty:{background:isSel?"var(--p)":"",color:isSel?"#fff":""}},
        s.time,s.clinic?h("div",{cls:"slt-name"},s.clinic):null);
      el.onclick=()=>{selSlot=s;rebSlots();rebBook();};
      grid.appendChild(el);
    });
    slotArea.appendChild(grid);
  }

  // ─── Service + new service + book button (rebuilt on svc change only) ─────
  const svcArea=h("div",{});
  body.appendChild(svcArea);
  const svcNameI=h("input",{cls:"fi",placeholder:"Название услуги *",sty:{marginBottom:8}});
  const svcPriceI=h("input",{cls:"fi",type:"number",placeholder:"Стоимость, ₽",sty:{marginBottom:8}});
  const svcDurI=h("input",{cls:"fi",type:"number",placeholder:"Длительность, мин",sty:{marginBottom:8}});
  const durOverI=h("input",{cls:"fi",type:"number"});
  durOverI.oninput=e=>customDur=parseInt(e.target.value)||30;

  function rebBook(){
    svcArea.innerHTML="";
    // Service select
    const svcSel=h("select",{cls:"fi"});
    svcSel.appendChild(h("option",{value:""},"— Выберите услугу —"));
    S.services.forEach(sv=>{const o=h("option",{value:sv.id},sv.name+(sv.price?" · "+Number(sv.price).toLocaleString("ru-RU")+" ₽":""));if(selSvc?.id===sv.id)o.selected=true;svcSel.appendChild(o);});
    svcSel.appendChild(h("option",{value:"__new__",selected:showNewSvc},"+ Создать новую услугу..."));
    svcSel.onchange=e=>{
      if(e.target.value==="__new__"){showNewSvc=true;selSvc=null;}
      else{selSvc=S.services.find(sv=>sv.id===e.target.value)||null;customDur=selSvc?.duration||null;showNewSvc=false;}
      rebBook();
    };
    svcArea.appendChild(h("div",{cls:"fg"},h("label",{cls:"fl"},"Услуга"),svcSel));

    // New service form (inputs are persistent — don't recreate them)
    if(showNewSvc||S.services.length===0){
      if(S.services.length===0)svcArea.appendChild(h("div",{cls:"alert alert-warn",sty:{marginBottom:8}},"Нет услуг. Создайте первую:"));
      const newSvcCard=h("div",{cls:"card",sty:{marginBottom:12}});
      newSvcCard.appendChild(h("div",{sty:{fontWeight:700,marginBottom:8}},"Новая услуга"));
      newSvcCard.appendChild(h("div",{sty:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
        h("div",{cls:"fg"},h("label",{cls:"fl"},"Название *"),svcNameI),
        h("div",{cls:"fg"},h("label",{cls:"fl"},"Стоимость (₽)"),svcPriceI)
      ));
      newSvcCard.appendChild(h("div",{cls:"fg"},h("label",{cls:"fl"},"Длительность (мин)"),svcDurI));
      newSvcCard.appendChild(h("button",{cls:"btn bp bsm",onclick:()=>{
        if(!svcNameI.value.trim())return;
        const sv={id:uid(),name:svcNameI.value.trim(),price:svcPriceI.value||"",duration:parseInt(svcDurI.value)||30};
        S.services=[...S.services,sv];triggerSave(["services"]);
        selSvc=sv;customDur=sv.duration;showNewSvc=false;
        svcNameI.value="";svcPriceI.value="";svcDurI.value="";
        rebBook();
      }},"Создать и выбрать"));
      svcArea.appendChild(newSvcCard);
    }

    // Duration override
    if(selSvc){
      durOverI.value=customDur||selSvc.duration||30;
      svcArea.appendChild(h("div",{cls:"fg"},h("label",{cls:"fl"},"Длительность (мин)"),durOverI));
    }

    // Book button
    const canBook=!!(selSlot&&selSvc);
    const bookBtn=h("button",{cls:"btn bp bw",onclick:async()=>{
      if(!selSlot||!selSvc)return;
      const dur=customDur||selSvc.duration||30;
      const upSlot={...selSlot,available:false,patientId:p.id,patientName:p.name,serviceId:selSvc.id,serviceName:selSvc.name,serviceDuration:dur};
      const ns={...S.schedule,[selDate]:{...S.schedule[selDate],slots:(S.schedule[selDate]?.slots||[]).map(s=>s.id!==selSlot.id?s:upSlot)}};
      S.patients=S.patients.map(pr=>pr.id!==p.id?pr:{...pr,status:pr.status==="new"?"scheduled":pr.status});
      S.schedule=ns;triggerSave(["patients","schedule"]);
      close();render();
    }},canBook?"✓ Записать на "+selSlot.time+" · "+fmtD(selDate):"Выберите время и услугу");
    bookBtn.disabled=!canBook;
    svcArea.appendChild(bookBtn);
  }

  rebDates();rebSlots();rebBook();
  overlay=h("div",{cls:"overlay",onclick:e=>{if(e.target===overlay)close();}},body);
  document.getElementById("app").appendChild(overlay);
}

// ===================== SCHEDULE =====================
const localDateStr=d=>{const D=new Date(d);return D.getFullYear()+"-"+(String(D.getMonth()+1).padStart(2,"0"))+"-"+(String(D.getDate()).padStart(2,"0"));};
function wDates(n){const r=[];const base=new Date();base.setHours(12,0,0,0);for(let i=0;i<60;i++){const d=new Date(base);d.setDate(d.getDate()+i);r.push(localDateStr(d));if(r.length>=(n||14))break;}return r;}
function getMonthDates(yr,mo){const r=[];const d=new Date(yr,mo,1,12,0,0);while(d.getMonth()===mo){r.push(localDateStr(d));d.setDate(d.getDate()+1);}return r;}

function renderSchedule(role){
  if(SCR.schYear===undefined){const n=new Date();SCR.schYear=n.getFullYear();SCR.schMonth=n.getMonth();}
  if(!SCR.schDate)SCR.schDate=today();
  const wrap=h("div",{});
  wrap.appendChild(h("div",{sty:{fontSize:18,fontWeight:800,marginBottom:10}},"Расписание"));

  // Month navigation
  const monthLbl=h("span",{sty:{fontWeight:700,fontSize:15,flex:1,textAlign:"center"}});
  const mnav=h("div",{sty:{display:"flex",alignItems:"center",gap:6,marginBottom:10}},
    h("button",{cls:"btn bs bsm",onclick:()=>{SCR.schMonth--;if(SCR.schMonth<0){SCR.schMonth=11;SCR.schYear--;}rebAll();}},"←"),
    monthLbl,
    h("button",{cls:"btn bs bsm",onclick:()=>{SCR.schMonth++;if(SCR.schMonth>11){SCR.schMonth=0;SCR.schYear++;}rebAll();}},"→"),
    h("button",{cls:"btn bs bsm",onclick:()=>{const n=new Date();SCR.schYear=n.getFullYear();SCR.schMonth=n.getMonth();SCR.schDate=today();rebAll();}},"Сегодня")
  );
  if(role!=="web"){
    mnav.appendChild(h("button",{cls:"btn ba bsm",onclick:()=>showCopyModal()},"📋 Копировать"));
  }
  wrap.appendChild(mnav);
  const calWrap=h("div",{sty:{marginBottom:12}});
  const slWrap=h("div",{});
  const detWrap=h("div",{});
  const tdStr=today();

  function rebDates(){
    const yr=SCR.schYear,mo=SCR.schMonth;
    monthLbl.textContent=new Date(yr,mo).toLocaleDateString("ru-RU",{month:"long",year:"numeric"});
    // Auto-select closest future working day in this month
    const allDays=getMonthDates(yr,mo);
    if(allDays.length&&!allDays.includes(SCR.schDate)){
      SCR.schDate=allDays.find(d=>d>=tdStr)||allDays[allDays.length-1];
    }
    calWrap.innerHTML="";
    // Weekday headers
    const hRow=h("div",{sty:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}});
    ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"].forEach(n=>
      hRow.appendChild(h("div",{sty:{textAlign:"center",fontSize:10,fontWeight:700,color:"var(--mu)",padding:"2px 0"}},n))
    );
    calWrap.appendChild(hRow);
    // Days grid
    const grid=h("div",{sty:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}});
    const firstDow=new Date(yr,mo,1).getDay();
    const offset=firstDow===0?6:firstDow-1;
    for(let i=0;i<offset;i++)grid.appendChild(h("div",{}));
    const daysInMonth=new Date(yr,mo+1,0).getDate();
    for(let day=1;day<=daysInMonth;day++){
      const d=new Date(yr,mo,day);
      const dow=d.getDay();
      const isWknd=dow===0||dow===6;
      const ds=localDateStr(d);
      const isPast=ds<tdStr;
      const isSel=ds===SCR.schDate;
      const isTdy=ds===tdStr;
      const slots=S.schedule[ds]?.slots||[];
      const fr=slots.filter(s=>s.available).length;
      const tot=slots.length;
      const inactive=false; // all days are clickable (past days show historical data)
      const cell=h("div",{sty:{
        padding:"6px 2px",borderRadius:"8px",textAlign:"center",
        cursor:inactive?"default":"pointer",
        background:isSel?"var(--p)":isTdy?"var(--pll)":"",
        opacity:inactive?"0.28":"1",
        border:isTdy&&!isSel?"1.5px solid var(--p)":"1.5px solid transparent",
        transition:"background .1s"
      }},
        h("div",{sty:{fontSize:13,fontWeight:700,color:isSel?"#fff":isPast?"var(--hi)":isWknd?"var(--a)":"var(--tx)"}},day),
        h("div",{sty:{fontSize:9,fontWeight:600,color:isSel?"rgba(255,255,255,.7)":tot>0?"var(--p)":"transparent",marginTop:1}},tot>0?fr+"/"+tot:"·")
      );
      if(isTdy)cell.setAttribute("data-today","1");
      if(!inactive){cell.onclick=()=>{SCR.schDate=ds;rebSlots();};}
      grid.appendChild(cell);
    }
    calWrap.appendChild(grid);
  }

  function rebSlots(){
    rebDates();
    slWrap.innerHTML="";detWrap.innerHTML="";
    const day=S.schedule[SCR.schDate]||{blocks:[],slots:[]};
    const slots=day.slots||[];
    // Will restore open slot detail after grid is built (see end of rebSlots)
    const fr=slots.filter(s=>s.available).length;
    slWrap.appendChild(h("div",{sty:{fontSize:13,color:"var(--mu)",marginBottom:10}},fmtF(SCR.schDate)+" · "+fr+" св. / "+slots.length+" всего"));

    if(role!=="web"){
      const blks=day.blocks||[];
      if(blks.length){
        slWrap.appendChild(h("div",{cls:"st"},"Блоки работы"));
        blks.forEach(blk=>{
          slWrap.appendChild(h("div",{cls:"block-card"},
            h("div",{},
              h("b",{},blk.fromTime+" – "+blk.toTime),
              h("div",{sty:{fontSize:12,color:"var(--mu)"}},(blk.clinic||"Клиника не указана")+" · "+blk.slotDuration+" мин/слот")
            ),
            h("button",{cls:"btn br bsm",onclick:async()=>{
              const nb=(day.blocks||[]).filter(b=>b.id!==blk.id);
              // Regenerate slots from remaining blocks, keep booked ones
              const bookedSlots=(day.slots||[]).filter(s=>!s.available&&s.patientId);
              let newSlots=[];nb.forEach(b=>newSlots=[...newSlots,...generateSlots(b)]);
              const merged=mergeSlots(bookedSlots,newSlots);
              S.schedule={...S.schedule,[SCR.schDate]:{...day,blocks:nb,slots:merged}};
              triggerSave(["schedule"]);rebSlots();
            }},"Удалить")
          ));
        });
      }
      let showBF=false;
      const addBBtn=h("button",{cls:"btn bs bsm",sty:{marginBottom:10},onclick:()=>{showBF=!showBF;rebBF();}},"+  Добавить блок");
      const bForm=h("div",{cls:"card",sty:{marginBottom:10,display:"none"}});
      const fT=h("input",{cls:"fi",type:"time",value:"09:00"});
      const tT=h("input",{cls:"fi",type:"time",value:"13:00"});
      const cSel=h("select",{cls:"fi"});cSel.appendChild(h("option",{value:""},"— Клиника —"));CLINICS.forEach(c=>cSel.appendChild(h("option",{value:c},c)));
      const cC=h("input",{cls:"fi",placeholder:"Или введите название..."});
      const durI=h("input",{cls:"fi",type:"number",value:"30",placeholder:"Мин/слот"});
      bForm.appendChild(h("div",{sty:{fontWeight:700,marginBottom:10}},"Новый блок: "+fmtD(SCR.schDate)));
      bForm.appendChild(h("div",{sty:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},

  function showCopyModal(){
    let overlay;
    function close(){if(overlay?.parentNode)overlay.parentNode.removeChild(overlay);}

    // ── Template blocks ───────────────────────────────────────────────────
    // Start with current day's blocks as template, or empty
    let tplBlocks=[...(S.schedule[SCR.schDate]?.blocks||[]).map(b=>({...b,id:uid()}))];
    if(!tplBlocks.length) tplBlocks=[{id:uid(),fromTime:"09:00",toTime:"13:00",clinic:CLINICS[0],slotDuration:30}];

    // ── Target: year/month + day-of-week checkboxes ────────────────────────
    let tgtYear=SCR.schYear,tgtMonth=SCR.schMonth;
    const DOW_RU=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
    // default: same dow as selected date
    const selDow=(new Date(SCR.schDate+"T12:00:00").getDay()+6)%7; // 0=Mon
    const dowSel=new Set([selDow]);

    // ── Specific dates selection (alternative mode) ─────────────────────
    let useSpecific=false;
    const specificDates=new Set();

    const tplWrap=h("div",{});
    const dowWrap=h("div",{sty:{display:"flex",gap:6,flexWrap:"wrap",margin:"8px 0 4px"}});
    const calWrap2=h("div",{sty:{marginBottom:12}});
    const previewEl=h("div",{sty:{fontSize:13,color:"var(--mu)",margin:"8px 0"}});
    const monthLbl2=h("span",{sty:{fontWeight:600,fontSize:14,flex:1,textAlign:"center"}});

    function buildTplBlocks(){
      tplWrap.innerHTML="";
      tplBlocks.forEach((blk,idx)=>{
        const fI=h("input",{cls:"fi",type:"time",value:blk.fromTime});
        const tI=h("input",{cls:"fi",type:"time",value:blk.toTime});
        const cS=h("select",{cls:"fi"});
        cS.appendChild(h("option",{value:""},"— Клиника —"));
        CLINICS.forEach(c=>{const o=h("option",{value:c},c);if(c===blk.clinic)o.selected=true;cS.appendChild(o);});
        const cC=h("input",{cls:"fi",placeholder:"Или введите...",value:CLINICS.includes(blk.clinic)?"":blk.clinic||""});
        const dI=h("input",{cls:"fi",type:"number",value:blk.slotDuration||30});
        fI.oninput=e=>{tplBlocks[idx].fromTime=e.target.value;updatePreview();};
        tI.oninput=e=>{tplBlocks[idx].toTime=e.target.value;updatePreview();};
        cS.onchange=e=>{tplBlocks[idx].clinic=e.target.value||cC.value;};
        cC.oninput=e=>{tplBlocks[idx].clinic=e.target.value;};
        dI.oninput=e=>{tplBlocks[idx].slotDuration=parseInt(e.target.value)||30;updatePreview();};
        const card=h("div",{cls:"block-card",sty:{gap:8,flexDirection:"column",alignItems:"stretch"}},
          h("div",{sty:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
            h("span",{sty:{fontWeight:700,fontSize:13}},"Блок "+(idx+1)),
            h("button",{cls:"btn br bsm",onclick:()=>{tplBlocks.splice(idx,1);buildTplBlocks();updatePreview();}},"✕")
          ),
          h("div",{sty:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}},
            h("div",{},h("label",{cls:"fl"},"С"),fI),
            h("div",{},h("label",{cls:"fl"},"По"),tI),
            h("div",{},h("label",{cls:"fl"},"Мин/слот"),dI)
          ),
          h("div",{},h("label",{cls:"fl"},"Клиника"),cS,cC)
        );
        tplWrap.appendChild(card);
      });
      const addB=h("button",{cls:"btn bs bsm",sty:{marginTop:4},onclick:()=>{
        tplBlocks.push({id:uid(),fromTime:"14:00",toTime:"18:00",clinic:CLINICS[0],slotDuration:30});
        buildTplBlocks();updatePreview();
      }},"+  Добавить блок");
      tplWrap.appendChild(addB);
    }

    function buildDowRow(){
      dowWrap.innerHTML="";
      DOW_RU.forEach((d,i)=>{
        const on=dowSel.has(i);
        const btn=h("button",{cls:"btn bsm "+(on?"bp":"bs"),sty:{minWidth:42}},d);
        btn.onclick=()=>{
          if(dowSel.has(i))dowSel.delete(i);else dowSel.add(i);
          buildDowRow();buildCalendar2();updatePreview();
        };
        dowWrap.appendChild(btn);
      });
    }

    function buildCalendar2(){
      calWrap2.innerHTML="";
      const yr=tgtYear,mo=tgtMonth;
      monthLbl2.textContent=new Date(yr,mo).toLocaleDateString("ru-RU",{month:"long",year:"numeric"});
      const grid=h("div",{sty:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}});
      // DOW headers
      const hdr=h("div",{sty:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}});
      DOW_RU.forEach(d=>hdr.appendChild(h("div",{sty:{textAlign:"center",fontSize:10,fontWeight:700,color:"var(--mu)",padding:"2px 0"}},d)));
      calWrap2.appendChild(hdr);
      const firstDow=new Date(yr,mo,1).getDay();
      const offset=firstDow===0?6:firstDow-1;
      for(let i=0;i<offset;i++)grid.appendChild(h("div",{}));
      const daysInMonth=new Date(yr,mo+1,0).getDate();
      for(let day=1;day<=daysInMonth;day++){
        const d=new Date(yr,mo,day,12,0,0);
        const dow=(d.getDay()+6)%7; // 0=Mon
        const ds=localDateStr(d);
        const isSrc=ds===SCR.schDate;
        const isAutoSel=!useSpecific&&dowSel.has(dow);
        const isManuSel=useSpecific&&specificDates.has(ds);
        const isSel=isAutoSel||isManuSel;
        const isBooked=(S.schedule[ds]?.slots||[]).some(s=>!s.available&&s.patientId);
        const cell=h("div",{sty:{
          padding:"6px 2px",borderRadius:8,textAlign:"center",cursor:"pointer",
          background:isSrc?"var(--a)":isSel?"var(--p)":"",
          border:isBooked&&!isSel?"1.5px dashed #FCA5A5":"1.5px solid transparent",
          opacity:1
        }},
          h("div",{sty:{fontSize:13,fontWeight:700,color:isSrc||isSel?"#fff":"var(--tx)"}},day)
        );
        if(useSpecific){
          cell.onclick=()=>{if(specificDates.has(ds))specificDates.delete(ds);else specificDates.add(ds);buildCalendar2();updatePreview();};
        }
        grid.appendChild(cell);
      }
      calWrap2.appendChild(grid);
      if(useSpecific&&specificDates.size>0){
        calWrap2.appendChild(h("div",{sty:{fontSize:12,color:"var(--mu)",marginTop:6}},
          "Выбрано дат: "+specificDates.size));
      }
    }

    function getTargetDates(){
      const yr=tgtYear,mo=tgtMonth;
      const daysInMonth=new Date(yr,mo+1,0).getDate();
      const dates=[];
      for(let day=1;day<=daysInMonth;day++){
        const d=new Date(yr,mo,day,12,0,0);
        const ds=localDateStr(d);
        const dow=(d.getDay()+6)%7;
        if(useSpecific?specificDates.has(ds):dowSel.has(dow)) dates.push(ds);
      }
      return dates;
    }

    function updatePreview(){
      const dates=getTargetDates();
      const slots=tplBlocks.reduce((sum,b)=>{
        const from=b.fromTime.split(":").reduce((a,v,i)=>i?a+parseInt(v):parseInt(v)*60,0);
        const to=b.toTime.split(":").reduce((a,v,i)=>i?a+parseInt(v):parseInt(v)*60,0);
        return sum+Math.floor((to-from)/(b.slotDuration||30));
      },0);
      previewEl.textContent=dates.length
        ?"Будет создано: "+dates.length+" дней × "+tplBlocks.length+" блок(а) × ~"+slots+" слотов"
        :"Выберите хотя бы один день";
    }

    // ── Mode toggle ──────────────────────────────────────────────────────
    const modeBtn=h("button",{cls:"btn bs bsm",onclick:()=>{
      useSpecific=!useSpecific;
      modeBtn.textContent=useSpecific?"← По дням недели":"Выбрать конкретные даты →";
      buildDowRow();buildCalendar2();updatePreview();
    }},"Выбрать конкретные даты →");

    buildTplBlocks();buildDowRow();buildCalendar2();updatePreview();

    const body=h("div",{cls:"modal"},
      // Header
      h("div",{sty:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
        h("div",{sty:{fontWeight:800,fontSize:18}},"Типовое расписание"),
        h("button",{cls:"hb",sty:{background:"var(--bg)",color:"var(--tx)"},onclick:close},"✕")
      ),
      // Step 1: Template blocks
      h("div",{cls:"st"},"1. Блоки работы"),
      tplWrap,
      // Step 2: Target month
      h("div",{cls:"st",sty:{marginTop:12}},"2. Месяц"),
      h("div",{sty:{display:"flex",alignItems:"center",gap:8,marginBottom:10}},
        h("button",{cls:"btn bs bsm",onclick:()=>{tgtMonth--;if(tgtMonth<0){tgtMonth=11;tgtYear--;}buildCalendar2();updatePreview();}},  "←"),
        monthLbl2,
        h("button",{cls:"btn bs bsm",onclick:()=>{tgtMonth++;if(tgtMonth>11){tgtMonth=0;tgtYear++;}buildCalendar2();updatePreview();}},  "→")
      ),
      // Step 3: Days selection
      h("div",{cls:"st"},"3. Дни"),
      modeBtn,
      dowWrap,
      calWrap2,
      h("div",{cls:"alert alert-warn",sty:{marginBottom:8,fontSize:12}},"⚠️ Красная пунктирная рамка = есть записанные пациенты. Их записи не удаляются, но свободные слоты будут пересозданы."),
      previewEl,
      // Apply button
      h("button",{cls:"btn bp bw",sty:{marginTop:8},onclick:async()=>{
        const dates=getTargetDates();
        if(!dates.length){alert("Выберите хотя бы один день");return;}
        const ns={...S.schedule};
        dates.forEach(ds=>{
          const curDay=ns[ds]||{blocks:[],slots:[]};
          const bookedSlots=(curDay.slots||[]).filter(s=>!s.available&&s.patientId);
          const newBlocks=tplBlocks.map(b=>({...b,id:uid()}));
          let newSlots=[];
          newBlocks.forEach(b=>newSlots=[...newSlots,...generateSlots(b)]);
          // Merge: keep booked, add new free slots
          const times=new Set(bookedSlots.map(s=>s.time));
          const toAdd=newSlots.filter(s=>!times.has(s.time));
          const merged=[...bookedSlots,...toAdd].sort((a,b2)=>a.time.localeCompare(b2.time));
          ns[ds]={blocks:newBlocks,slots:merged};
        });
        S.schedule=ns;triggerSave(["schedule"]);
        close();rebAll();
        const msg=h("div",{cls:"alert alert-ok",sty:{marginTop:8}},"✓ Расписание создано на "+dates.length+" дней");
        slWrap.insertBefore(msg,slWrap.firstChild);
        setTimeout(()=>msg.remove(),4000);
      }},"✓ Применить расписание")
    );
    overlay=h("div",{cls:"overlay",onclick:e=>{if(e.target===overlay)close();}},body);
    document.getElementById("app").appendChild(overlay);
  }

  rebDates();rebSlots();
  wrap.appendChild(calWrap);wrap.appendChild(slWrap);wrap.appendChild(detWrap);
  return wrap;
}

  function bld(q){
    inner.innerHTML="";
    const fl=(q?S.patients.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||(p.phone||"").includes(q)):[...S.patients]).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
    if(!fl.length){inner.appendChild(h("div",{cls:"emp"},h("div",{cls:"empi"},"👥"),h("div",{},"Нет пациентов")));return;}
    const tbl=h("table",{cls:"tbl"});
    tbl.appendChild(h("thead",{},h("tr",{},h("th",{},"Пациент"),h("th",{},"Статус"),h("th",{},"Операция"),h("th",{},"Цена"),h("th",{},"Контакт"))));
    const tb=h("tbody",{});
    fl.forEach(p=>{const s=ST[p.status];tb.appendChild(h("tr",{onclick:()=>{SCR.openEdit=true;SCR.editId=p.id;reb();}},
      h("td",{},h("div",{sty:{fontWeight:600}},p.name),h("div",{sty:{fontSize:11,color:"#6B7280"}},(p.phone||"")+(p.birthDate?" · "+ageLabel(p.birthDate):""))),
      h("td",{},h("span",{cls:"tag",sty:{background:(s?.c||"#ccc")+"22",color:s?.c}},s?.l)),
      h("td",{},p.opDate?fmtD(p.opDate):(p.opDateText||"—")),

    ));});
    tbl.appendChild(tb);inner.appendChild(tbl);
  }
  inp.addEventListener("input",e=>bld(e.target.value));bld("");
  tW.appendChild(inner);wrap.appendChild(inp);wrap.appendChild(tW);return wrap;
}

      await savePats([...S.patients,p],true);onBack();

// ===================== ASSISTANT =====================
function renderAssistant(){
  const td=today();
  const allT=[];
  S.patients.forEach(p=>(p.tasks||[]).forEach(t=>{if(!t.completed)allT.push({...t,pId:p.id,pName:p.name,pPhone:p.phone});}));
  allT.sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const ov=allT.filter(t=>t.dueDate<td),tT=allT.filter(t=>t.dueDate===td),lT=allT.filter(t=>t.dueDate>td);
  const needC=S.patients.filter(p=>p.nextContact&&p.nextContact<=td);
  const pend=ov.length+tT.length+needC.length;
  const wrap=h("div",{sty:{display:"flex",flexDirection:"column",minHeight:"100vh",background:"var(--bg)"}});
  const hdr=h("header",{cls:"hdr"},
    h("div",{},h("div",{cls:"ht"},"🩺 Доктор Войнов"),h("div",{cls:"hs"},S.session?.name||"Ассистент")),
    h("div",{sty:{display:"flex",gap:6}},
      h("button",{cls:"hb",onclick:()=>{
        const u=S.users.find(x=>x.id===S.session?.userId);
        if(!u)return;
        SCR.sub="changepw";render();
      }},"🔑"),
      h("button",{cls:"hb",onclick:()=>{S.session=null;saveCfg();render();}},"Выход")
    ));
  let content;
  if(SCR.sub==="changepw"){
    const u=S.users.find(x=>x.id===S.session?.userId);
    content=u?renderChangePassword(u,()=>{SCR.sub=null;render();}):h("div",{},"");
  }
  else if(SCR.sub==="addpat")content=renderAddPatForm("assistant",()=>{SCR.sub=null;render();});
  else if(SCR.sub==="pat"&&SCR.editId){
  const p=S.patients.find(x=>x.id===SCR.editId);
  content=renderPatDetail(p,"assistant",()=>{
    SCR.sub=null;SCR.editId=null;SCR.patTab=null;SCR._lastPatId=null;
    // Scroll to top ONLY when going back, not on internal save
    window.scrollTo&&window.scrollTo(0,0);
    render();
  });
}
  else if(SCR.tab==="today")content=renderToday(ov,tT,lT,needC);
  else if(SCR.tab==="pats")content=renderPatsTab();
  else content=renderSchedule("assistant");
  const nav=h("nav",{cls:"bn"},
    ...[{k:"today",i:"✅",l:"Сегодня",b:pend},{k:"pats",i:"👥",l:"Пациенты"},{k:"sched",i:"📅",l:"Расписание"}].map(t=>
      h("button",{cls:"bt"+(SCR.tab===t.k&&!SCR.sub?" on":""),onclick:()=>{SCR.tab=t.k;SCR.sub=null;render();}},
        h("span",{cls:"bti"},t.i),h("span",{cls:"btl"},t.l),t.b>0?h("span",{cls:"bdg"},t.b):null)
    )
  );
  const els=[hdr,mkSyncBar(),h("div",{cls:"scr"},content),nav];
  if(S._previewFrom){
    els.unshift(h("div",{sty:{background:"#1A1A1A",color:"#fff",padding:"9px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:13,flexShrink:0}},
      h("span",{},"👁 Просмотр: "+ROLES[S.session.role]),
      h("button",{sty:{background:"var(--p)",border:"none",color:"#fff",padding:"5px 14px",borderRadius:7,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700},onclick:()=>{S.session={...S.session,role:S._previewFrom};S._previewFrom=null;render();}},"← Назад в Admin")
    ));
  }
  els.forEach(e=>wrap.appendChild(e));return wrap;
}

function renderToday(ov,tT,lT,needC){
  const f=document.createDocumentFragment();
  const todayTopRow=h("div",{sty:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}},
    h("div",{sty:{fontSize:18,fontWeight:800}},"Задачи на сегодня"),
    h("button",{cls:"btn bp bsm",onclick:()=>{SCR.sub="addpat";render();}},"+ Пациент")
  );
  f.appendChild(todayTopRow);
  f.appendChild(h("div",{sty:{fontSize:13,color:"var(--mu)",marginBottom:12}},new Date().toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"})));
  if(needC.length){
    f.appendChild(h("div",{cls:"st",sty:{color:"var(--a)"}},"📞 Требуют контакта — "+needC.length));
    needC.forEach(p=>f.appendChild(patCard(p,()=>{SCR.sub="pat";SCR.editId=p.id;render();})));
  }
  if(ov.length){f.appendChild(h("div",{cls:"st",sty:{color:"var(--r)"}},"⚠️ Просроченные — "+ov.length));ov.forEach(t=>f.appendChild(taskRowSimple(t,true,false)));}
  if(tT.length){f.appendChild(h("div",{cls:"st"},"📋 Сегодня — "+tT.length));tT.forEach(t=>f.appendChild(taskRowSimple(t,false,false)));}
  if(!ov.length&&!tT.length&&!needC.length)f.appendChild(h("div",{cls:"emp"},h("div",{cls:"empi"},"🎉"),h("div",{},"Нет срочных задач!")));
  if(lT.length){f.appendChild(h("div",{cls:"st",sty:{marginTop:8}},"📌 Ближайшие"));lT.slice(0,8).forEach(t=>f.appendChild(taskRowSimple(t,false,true)));}
  return f;
}
function taskRowSimple(t,urg,fut){
  const el=h("div",{cls:"task-item",sty:urg?{borderLeft:"3px solid var(--r)"}:{}});
  el.style.borderLeft=urg?"3px solid var(--r)":"";
  const chk=h("button",{cls:"task-done-btn",onclick:async e=>{
    e.stopPropagation();
    await savePats(S.patients.map(p=>p.id!==t.pId?p:{...p,tasks:(p.tasks||[]).map(tk=>tk.id!==t.id?tk:{...tk,completed:true,completedAt:new Date().toISOString()})}),true);
    // Remove from today list
    const row=e.target.closest(".task-item");if(row)row.remove();
  }},"✓");
  const hdr=h("div",{cls:"task-hdr",onclick:()=>{SCR.openTaskId=t.id;SCR.sub="pat";SCR.editId=t.pId;render();}},
    h("div",{sty:{flex:1}},
      h("div",{sty:{fontWeight:700,fontSize:14}},t.pName),
      t.pPhone?h("div",{sty:{fontSize:12,color:"var(--mu)"}},t.pPhone):null,
      h("span",{cls:"tag",sty:{background:"var(--pll)",color:"var(--p)"}},CT[t.type]||t.type),
      t.dueDate!==today()&&h("div",{sty:{fontSize:11,color:fut?"var(--mu)":"var(--r)",marginTop:3}},"📅 "+fmtD(t.dueDate))
    ),chk
  );
  el.appendChild(hdr);return el;
}
function renderPatsTab(){
  const wrap=h("div",{});
  const hd=h("div",{sty:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}},
    h("div",{sty:{fontSize:18,fontWeight:800}},"Пациенты"),
    h("button",{cls:"btn bp bsm",onclick:()=>{SCR.sub="addpat";render();}},"+ Добавить"));
  const inp=h("input",{cls:"fi",placeholder:"Поиск...",sty:{marginBottom:14}});
  inp.value=SCR._patSearch||"";
  const lst=h("div",{});
  function draw(q){
    SCR._patSearch=q;
    lst.innerHTML="";
    const fl=(q?S.patients.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||(p.phone||"").includes(q)):[...S.patients]).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
    if(!fl.length){lst.appendChild(h("div",{cls:"emp"},h("div",{cls:"empi"},"👤"),h("div",{},"Нет пациентов")));return;}
    fl.forEach(p=>lst.appendChild(patCard(p,()=>{SCR.sub="pat";SCR.editId=p.id;render();})));
  }
  inp.addEventListener("input",e=>draw(e.target.value));draw("");
  wrap.appendChild(hd);wrap.appendChild(inp);wrap.appendChild(lst);return wrap;
}

// ===================== WEB =====================
function renderWeb(){
  const wd=wDates(21);if(!SCR.schDate||!wd.includes(SCR.schDate))SCR.schDate=wd[0]||today();
  const wrap=h("div",{sty:{display:"flex",flexDirection:"column",minHeight:"100vh"}});
  wrap.appendChild(h("header",{cls:"hdr"},h("div",{},h("div",{cls:"ht"},"🌐 Команда сайта"),h("div",{cls:"hs"},"doctorvoinov.ru")),h("button",{cls:"hb",onclick:()=>{S.session=null;saveCfg();render();}},"Выход")));
  wrap.appendChild(mkSyncBar());
  const tFr=(S.schedule[today()]?.slots||[]).filter(s=>s.available).length;
  const tAll=(S.schedule[today()]?.slots||[]).length;
  const scr=h("div",{cls:"scr",sty:{paddingBottom:16}});
  scr.appendChild(h("div",{cls:"card",sty:{background:"var(--p)",border:"none",color:"#fff",marginBottom:16}},
    h("div",{sty:{fontSize:12,opacity:.75}},"Свободных слотов сегодня"),
    h("div",{sty:{fontSize:38,fontWeight:800,margin:"4px 0"}},tFr),
    h("div",{sty:{fontSize:12,opacity:.6}},"из "+tAll+" всего")
  ));
  const dr=h("div",{cls:"dr"});const slW=h("div",{cls:"card",sty:{marginTop:14}});
  function bld(){
    dr.innerHTML="";slW.innerHTML="";
    wd.forEach(d=>{const dd=new Date(d);const fr=(S.schedule[d]?.slots||[]).filter(s=>s.available).length;
      const b=h("button",{cls:"dc"+(d===SCR.schDate?" on":""),onclick:()=>{SCR.schDate=d;bld();}},h("span",{cls:"dsb"},dd.toLocaleDateString("ru-RU",{weekday:"short"})),dd.getDate(),h("span",{cls:"dsb",sty:{color:d===SCR.schDate?"rgba(255,255,255,.8)":"var(--p)"}},fr+" св."));
      dr.appendChild(b);
    });
    slW.appendChild(h("div",{sty:{fontWeight:700,marginBottom:10}},fmtF(SCR.schDate)));
    const sw=h("div",{sty:{display:"flex",flexWrap:"wrap"}});
    (S.schedule[SCR.schDate]?.slots||[]).forEach(s=>sw.appendChild(h("div",{cls:"slt "+(s.available?"fr":"bk")},s.time,s.clinic?h("div",{cls:"slt-name"},s.clinic):null)));
    slW.appendChild(sw);
  }
  bld();
  const apiBtn=h("button",{cls:"btn bs bw",sty:{marginTop:12}},"{ } JSON API");
  const apiB=h("div",{cls:"card",sty:{marginTop:10,display:"none"}});
  apiBtn.onclick=()=>{
    const shown=apiB.style.display!=="none";apiB.style.display=shown?"none":"block";apiBtn.textContent=shown?"{ } JSON API":"Скрыть";
    if(!shown){const data={};wd.forEach(d=>{const sl=(S.schedule[d]?.slots||[]).filter(s=>s.available).map(s=>({time:s.time,clinic:s.clinic||""}));data[d]={available_slots:sl,count:sl.length};});apiB.innerHTML="";apiB.appendChild(h("pre",{sty:{fontSize:11,overflowX:"auto",background:"#F5F4F0",padding:12,borderRadius:8,color:"#333",maxHeight:280}},JSON.stringify(data,null,2)));}
  };
  [h("div",{cls:"st"},"По датам"),dr,slW,apiBtn,apiB].forEach(e=>scr.appendChild(e));
  if(S._previewFrom){
    wrap.insertBefore(h("div",{sty:{background:"#1A1A1A",color:"#fff",padding:"9px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:13}},
      h("span",{},"👁 Просмотр: "+ROLES[S.session.role]),
      h("button",{sty:{background:"var(--p)",border:"none",color:"#fff",padding:"5px 14px",borderRadius:7,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700},onclick:()=>{S.session={...S.session,role:S._previewFrom};S._previewFrom=null;render();}},"← Назад в Admin")
    ),wrap.firstChild);
  }
  wrap.appendChild(scr);return wrap;
}

// ===================== INIT =====================
window.addEventListener("focus",()=>{
  if(S.apiUrl&&!S.loading)loadData().then(()=>{
    updateSyncBars();
    const userIsEditing=!!(SCR.editId||SCR.sub==="pat"||SCR.openSlotId);
    if(S.session&&_pendingKeys.size===0&&!userIsEditing)render();
  });
});
setInterval(()=>{
  const userIsEditing=!!(SCR.editId||SCR.sub==="pat"||SCR.openSlotId);
  const okToRefresh=_pendingKeys.size===0&&(Date.now()-S._lastSaveMs>10000)&&!userIsEditing;
  if(S.apiUrl&&!S.loading&&S.session&&okToRefresh)
    loadData().then(()=>{updateSyncBars();render();});
},15000);
loadCfg();
if(!S.apiUrl){render();}
else{loadData().then(()=>{
  S._previewFrom=null;
  if(!S.session){render();return;}
  const u=S.users.find(x=>x.id===S.session.userId&&x.active!==false);
  if(!u){S.session=null;saveCfg();render();return;}
  if(u.role!==S.session.role){S.session={...S.session,role:u.role};saveCfg();}
  render();
});}</script>
